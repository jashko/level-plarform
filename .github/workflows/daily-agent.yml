name: LEVEL Platform — Daily AI Agent

# ⏸ ПАУЗА: расписание отключено до готовности пула улучшений.
# Для включения: раскомментируй schedule блок ниже.
on:
  # schedule:
  #   # 07:00 МСК = 04:00 UTC (каждый день)
  #   - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Verbose output'
        required: false
        default: 'false'

jobs:
  run-agent:
    name: Запуск ИИ-агента мониторинга
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run AI Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "🤖 Запуск ИИ-агента $(date '+%Y-%m-%d %H:%M:%S UTC')"
          npx tsx scripts/data-agent.ts

      - name: Rebuild bundle with new data
        run: npm run bundle

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/agent-output.json ui/app.js ui/engine.js \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "LEVEL AI Agent"
          git config user.email "agent@level-platform.ai"

          DATE=$(date '+%Y-%m-%d')
          NEWS_COUNT=$(node -e "
            const d = require('./src/data/agent-output.json');
            process.stdout.write(String(d.newsItems?.length ?? 0));
          ")

          git add \
            src/data/agent-output.json \
            ui/app.js \
            ui/engine.js

          git commit -m "🤖 AI Agent update ${DATE}: ${NEWS_COUNT} news items

Auto-generated by LEVEL Platform AI Agent (claude-sonnet-4-5)
Sources: cbr.ru, domrf.ru, rbc.ru/realty, kommersant.ru
Run: ${{ github.run_id }}"

          git push origin main

      - name: No changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "ℹ️ Нет изменений в данных агента"

      - name: Summary
        run: |
          node -e "
            const d = require('./src/data/agent-output.json');
            console.log('═══════════════════════════════');
            console.log('Статус:   ' + d.status);
            console.log('Новостей: ' + (d.newsItems?.length ?? 0));
            console.log('Обновлений данных: ' + (d.dataUpdates?.length ?? 0));
            console.log('Время:    ' + (d.runDurationMs / 1000).toFixed(1) + 'с');
            console.log('Резюме:   ' + d.summary?.slice(0, 120) + '...');
            console.log('═══════════════════════════════');
          "
