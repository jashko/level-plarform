name: Daily Intelligence Agent

on:
  schedule:
    - cron: '0 4 * * *'   # 07:00 МСК
  workflow_dispatch:

jobs:
  agent:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --ignore-scripts

      - name: 📊 Обновить ставки
        run: npm run fetch-cbr

      - name: 🤖 Запустить агента
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/data-agent.ts

      - name: 📦 Собрать бандл
        run: npm run bundle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 💾 Коммит и пуш
        run: |
          git config user.name  "LEVEL AI Agent"
          git config user.email "agent@level-platform.ai"
          git add src/data/ ui/app.js ui/engine.js
          git diff --cached --quiet && echo "⏭ Нет изменений" && exit 0
          NEWS=$(node -e "const d=require('./src/data/agent-output.json');process.stdout.write(String(d.newsItems?.length??0))")
          CITIES=$(node -e "const d=require('./src/data/agent-output.json');process.stdout.write(String(d.cityDataUpdates?.length??0))")
          git commit -m "🤖 $(date '+%Y-%m-%d') — ${NEWS} новостей, ${CITIES} городов"
          git push origin main

      - name: 🚀 Деплой на Vercel
        run: npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
