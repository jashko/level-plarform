name: LEVEL Platform — Daily AI Agent

on:
  schedule:
    # 07:00 МСК = 04:00 UTC каждый день
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  run-agent:
    name: Запуск ИИ-агента мониторинга
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --ignore-scripts

      - name: Run AI Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/data-agent.ts

      - name: Fetch latest rates
        run: npm run fetch-cbr

      - name: Rebuild bundle
        run: npm run bundle

      - name: Commit & push
        run: |
          git config user.name  "LEVEL AI Agent"
          git config user.email "agent@level-platform.ai"
          git add src/data/agent-output.json src/data/macro-cbr.json ui/app.js ui/engine.js
          git diff --cached --quiet && echo "no changes" && exit 0
          DATE=$(date '+%Y-%m-%d')
          NEWS=$(node -e "const d=require('./src/data/agent-output.json');process.stdout.write(String(d.newsItems?.length??0))")
          git commit -m "🤖 AI Agent ${DATE} — ${NEWS} новостей"
          git push origin main
