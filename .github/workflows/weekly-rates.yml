name: LEVEL Platform — Daily Rates Update

on:
  schedule:
    # 06:30 МСК = 03:30 UTC каждый день (до агента)
    - cron: '30 3 * * *'
  workflow_dispatch:

jobs:
  update-rates:
    name: Fetch CBR + ипотека
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --ignore-scripts

      - run: npm run fetch-cbr

      - run: npm run bundle

      - name: Commit & push
        run: |
          git config user.name  "LEVEL Rates Bot"
          git config user.email "rates@level-platform.ai"
          git add src/data/macro-cbr.json ui/app.js ui/engine.js
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "📊 Rates update $(date -u +'%Y-%m-%d')"
          git push origin main
